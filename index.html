<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ريفن | Fallen Raven - Full Stack Developer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050505] text-white overflow-x-hidden">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-2xl z-50 border-b border-purple-900">
    <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <span class="text-4xl">🪶</span>
        <h1 class="text-3xl font-bold tracking-tighter raven-glow">FALLEN RAVEN</h1>
      </div>
      <div class="flex items-center gap-8 text-sm">
        <button onclick="toggleLanguage()" id="lang-btn" class="hover:text-purple-400 transition">EN / عربي</button>
        <button onclick="toggleTheme()" class="p-3 rounded-2xl hover:bg-zinc-900 transition">
          <i class="fa-solid fa-moon text-2xl" id="theme-icon"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="min-h-screen flex items-center justify-center relative">
    <div class="absolute inset-0 bg-[radial-gradient(at_center,#4c1d95_0%,transparent_70%)] opacity-30"></div>
    <div class="max-w-5xl mx-auto text-center px-6 pt-20 relative z-10">
      <img src="https://images.unsplash.com/photo-1617791160588-241658c0f566?q=80&w=800" 
           alt="ريفن" class="w-48 h-48 mx-auto mb-10 rounded-2xl border-4 border-purple-500 shadow-2xl raven-image">
      
      <h1 id="typing-hero" class="text-6xl md:text-7xl font-bold leading-tight mb-6"></h1>
      <p class="text-2xl text-purple-400 mb-12" id="hero-subtitle">Full Stack Developer • Yemen</p>
      
      <div class="flex flex-wrap justify-center gap-6">
        <a href="#projects" class="px-10 py-5 bg-gradient-to-r from-purple-600 to-violet-700 rounded-2xl font-semibold text-lg hover:scale-110 transition-all">View Creations</a>
        <a href="#contact" class="px-10 py-5 border-2 border-purple-400 hover:bg-purple-500/10 rounded-2xl font-semibold text-lg transition-all">Let's Talk</a>
      </div>
    </div>
  </section>

  <!-- About -->
  <section class="py-28 bg-zinc-950" id="about">
    <div class="max-w-4xl mx-auto px-6">
      <h2 class="text-5xl font-bold text-center mb-16 raven-glow" id="about-title">The Raven's Tale</h2>
      <div id="about-text" class="text-lg leading-relaxed text-zinc-300 space-y-8 text-center"></div>
    </div>
  </section>

  <!-- Skills -->
  <section class="py-28 bg-black" id="skills">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-5xl font-bold text-center mb-20 raven-glow" id="skills-title">Powers I Command</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-8" id="skills-grid"></div>
    </div>
  </section>

  <!-- Projects -->
  <section class="py-28 bg-zinc-950" id="projects">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-5xl font-bold text-center mb-20 raven-glow" id="projects-title">Legendary Creations</h2>
      <div class="grid md:grid-cols-2 gap-12" id="projects-grid"></div>
    </div>
  </section>

  <!-- Contact -->
  <section class="py-28 bg-black" id="contact">
    <div class="max-w-4xl mx-auto px-6 text-center">
      <h2 class="text-5xl font-bold mb-10 raven-glow" id="contact-title">Shall We Forge Legend Together?</h2>
      <a href="https://wa.me/967735524426" target="_blank" 
         class="inline-flex items-center gap-5 bg-green-600 hover:bg-green-700 px-16 py-8 rounded-3xl text-2xl font-semibold transition-all hover:scale-110">
        <i class="fa-brands fa-whatsapp text-5xl"></i>
        Message Me
      </a>
    </div>
  </section>

  <!-- Floating WhatsApp -->
  <a href="https://wa.me/967735524426" target="_blank" 
     class="fixed bottom-10 right-10 bg-green-600 w-16 h-16 rounded-full flex items-center justify-center text-4xl shadow-2xl hover:scale-125 transition z-50">
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <script src="script.js"></script>
</body>
</html>
